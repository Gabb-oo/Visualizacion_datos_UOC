<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evolución del precio del gasóleo - Control Total</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 40px; background: #f2f4f7; }
    #contenedor { background: white; border-radius: 12px; padding: 30px; max-width: 900px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { font-weight: 600; font-size: 28px; margin-bottom: 5px; }
    .subtitulo { color: #666; margin-top: 0; margin-bottom: 20px; font-size: 16px; }
    .controles { display: flex; gap: 10px; margin-bottom: 20px; }
    button { padding: 10px 18px; cursor: pointer; background: #0057ff; color: white; border: none; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
    button:hover { background: #003fcc; }
    button.secundario { background: #eef2ff; color: #0057ff; border: 1px solid #0057ff; }
    button.secundario:hover { background: #e0e7ff; }
    #boton-reset { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    #boton-reset:hover { background: #e5e7eb; }

    .descripcion { margin-bottom: 20px; max-width: 700px; line-height: 1.5; color: #333; height: 3.5em; }
    svg { overflow: visible; background: #fafafa; border-radius: 4px; }
    .linea { fill: none; stroke: #769ff1; stroke-width: 3px; }
    .eje text { font-size: 11px; fill: #333; }
    
    /* --- AJUSTE DE TRANSICIÓN SUAVE --- */
    /* Usamos solo opacidad y pointer-events para un fundido limpio */
    .oculto { 
      opacity: 0; 
      pointer-events: none; 
      transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out; 
    }
    
    .visible { 
      opacity: 1; 
      pointer-events: auto; 
      transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out; 
    }
    /* ---------------------------------- */
    
    .etiqueta-evento, .punto-evento, .linea-conexion { transition-delay: 0.1s; }
    .linea-conexion { stroke: #0057ff; stroke-width: 1.5px; stroke-dasharray: 2,2; opacity: 0.5; }
    #apendice { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 13px; color: #444; }
    .hitos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .hito-item strong { color: #0057ff; }
  </style>
</head>
<body>
  <div id="contenedor">
    <h1 id="titulo">Fluctuación Pura del Precio</h1>
    <p class="subtitulo" id="subtitulo">Visualización abstracta de la tendencia histórica</p>
    <p class="descripcion" id="texto-descripcion"></p>
    
    <div class="controles">
      <button id="boton-modo">Ver gráfico con contexto</button>
      <button id="boton-historia" class="secundario oculto">Reproducir historia</button>
      <button id="boton-reset" class="oculto">Resetear Vista</button>
    </div>

    <div id="grafico"></div>

    <div id="apendice" class="oculto">
      <h3>Cronología de Impactos en el Mercado</h3>
      <div class="hitos-grid" id="grid-hitos"></div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const margin = { top: 60, right: 60, bottom: 40, left: 50 };
    const width = 850 - margin.left - margin.right;
    const height = 400 - margin.top - margin.bottom;

    const svg = d3.select("#grafico").append("svg")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    const parseISO = d3.utcParse("%Y-%m-%d");
    const parseWeek = d3.utcParse("%G-W%V-%u");

    let abortarHistoria = false;
    let historiaEnCurso = false;

    const descripcionesHitos = {
      "Crisis 2008": "Quiebra de Lehman Brothers, catalizador de la crisis global.",
      "Colapso 2014": "Reunión OPEP: decisión de no recortar producción pese al exceso de oferta.",
      "COVID-19": "Inicio del impacto severo y restricciones de movilidad en Europa.",
      "Recuperación": "Aumento de demanda tras el fin de los confinamientos estrictos.",
      "Guerra Ucrania": "Invasión rusa que disparó el gasóleo >2 €/L en España.",
      "Conflicto Gaza": "Ataque de Hamás e inestabilidad en el suministro del crudo Brent.",
      "Campaña EEUU-Irán": "Escenario de máxima tensión en el Estrecho de Ormuz que provocó el bloqueo temporal de las rutas de exportación de crudo."
    };

    d3.csv("evolucion_del_precio_de_gasoleo_en_espana.csv").then(datos => {
      const eventos = [
        { fecha: parseISO("2008-09-15"), texto: "Crisis 2008" },
        { fecha: parseISO("2014-11-27"), texto: "Colapso 2014" },
        { fecha: parseISO("2020-02-15"), texto: "COVID-19" },
        { fecha: parseISO("2021-07-01"), texto: "Recuperación" },
        { fecha: parseISO("2022-02-24"), texto: "Guerra Ucrania" },
        { fecha: parseISO("2023-10-07"), texto: "Conflicto Gaza" },
        { fecha: parseISO("2026-02-28"), texto: "Campaña EEUU-Irán" }
      ];

      const grid = d3.select("#grid-hitos");
      eventos.forEach(ev => {
        grid.append("div").attr("class", "hito-item").html(`<strong>${ev.texto}:</strong> ${descripcionesHitos[ev.texto]}`);
      });

      datos.forEach(d => {
        d.Precio = +d.Precio;
        d.fecha = parseWeek(`${d.Año}-W${String(d.Periodo.replace("Semana ", "")).padStart(2, "0")}-1`);
      });

      const xOriginal = d3.scaleUtc().domain([d3.min(datos, d => d.fecha), d3.timeMonth.offset(d3.max(datos, d => d.fecha), 2)]).range([0, width]);
      const yOriginal = d3.scaleLinear().domain([d3.min(datos, d => d.Precio) - 0.05, d3.max(datos, d => d.Precio) + 0.05]).range([height, 0]);

      let x = xOriginal.copy(), y = yOriginal.copy();
      const linea = d3.line().x(d => x(d.fecha)).y(d => y(d.Precio)).curve(d3.curveMonotoneX);

      svg.append("defs").append("clipPath").attr("id", "clip").append("rect").attr("width", width + 60).attr("x", -5).attr("y", -margin.top).attr("height", height + margin.top + 40);
      const areaGrafico = svg.append("g").attr("clip-path", "url(#clip)");
      const pathBase = areaGrafico.append("path").datum(datos).attr("class", "linea").attr("d", linea);

      const grupoEventos = areaGrafico.append("g");
      const conexiones = grupoEventos.selectAll(".linea-conexion").data(eventos).enter().append("line").attr("class", "linea-conexion oculto");
      const etiquetas = grupoEventos.selectAll(".etiqueta-evento").data(eventos).enter().append("text").attr("class", "etiqueta-evento oculto").style("font-size", "10px").style("fill", "#0057ff");
      const puntosEvento = grupoEventos.selectAll(".punto-evento").data(eventos).enter().append("circle").attr("class", "punto-evento oculto").attr("r", 4).style("fill", "#0057ff");

      const ejeX = areaGrafico.append("g").attr("class", "eje oculto").attr("transform", `translate(0,${height})`);
      const ejeY = svg.append("g").attr("class", "eje oculto");

      function actualizarEscena() {
        pathBase.attr("d", linea);
        ejeX.call(d3.axisBottom(x).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat("%Y")));
        ejeY.call(d3.axisLeft(y).ticks(6));
        
        conexiones.attr("x1", d => x(d.fecha)).attr("x2", d => x(d.fecha)).attr("y1", d => {
            const i = d3.bisector(dt => dt.fecha).left(datos, d.fecha);
            return i < datos.length ? y(datos[i].Precio) : height;
        }).attr("y2", (d, i) => (i % 2 === 0) ? -15 : -35);

        etiquetas.text(d => d.texto).attr("x", d => x(d.fecha)).attr("y", (d, i) => (i % 2 === 0) ? -20 : -40).attr("text-anchor", d => (x(d.fecha) > width - 80) ? "end" : "middle");
        puntosEvento.attr("cx", d => x(d.fecha)).attr("cy", d => {
            const i = d3.bisector(dt => dt.fecha).left(datos, d.fecha);
            return i < datos.length ? y(datos[i].Precio) : height;
        });
      }

      const zoomBehavior = d3.zoom().scaleExtent([1, 20]).translateExtent([[0, 0], [width, height]]).on("zoom", (e) => {
        x = e.transform.rescaleX(xOriginal);
        actualizarEscena();
      });
      d3.select("svg").call(zoomBehavior);

      function resetVista() {
        d3.select("svg").transition().duration(1000).ease(d3.easeCubicInOut)
          .call(zoomBehavior.transform, d3.zoomIdentity);
      }

      function cambiarModo(contexto) {
        if (!contexto) {
            abortarHistoria = true;
            historiaEnCurso = false;
            resetVista();
        }
        
        // Aplicamos clases visible/oculto a todos los elementos contextuales, incluidos botones
        d3.selectAll(".eje, .etiqueta-evento, .punto-evento, .linea-conexion, #boton-historia, #boton-reset")
          .classed("visible", contexto)
          .classed("oculto", !contexto);
          
        d3.select("#apendice").classed("visible", contexto).classed("oculto", !contexto);
        d3.select("#titulo").text(contexto ? "Impacto Geopolítico en el Gasóleo" : "Fluctuación Pura del Precio");
        d3.select("#texto-descripcion").text(contexto ? "Análisis de hitos históricos." : "La tendencia del precio sin distracciones.");
        actualizarEscena();
      }

      async function reproducirHistoria() {
        if (historiaEnCurso) return;
        historiaEnCurso = true;
        abortarHistoria = false;
        cambiarModo(true);
        
        d3.selectAll(".etiqueta-evento, .punto-evento, .linea-conexion").classed("visible", false).classed("oculto", true);
        
        const svgElement = d3.select("svg");
        await svgElement.transition().duration(750).call(zoomBehavior.transform, d3.zoomIdentity).end();

        for (let i = 0; i < eventos.length; i++) {
          if (abortarHistoria) break;
          const ev = eventos[i];
          const escala = 3;
          const tx = width / 2 - xOriginal(ev.fecha) * escala;
          const transform = d3.zoomIdentity.translate(tx, 0).scale(escala);
          
          await svgElement.transition().duration(1500).ease(d3.easeCubicInOut).call(zoomBehavior.transform, transform).end();

          if (abortarHistoria) break;
          d3.selectAll(".etiqueta-evento, .punto-evento, .linea-conexion").filter(d => d.fecha === ev.fecha).classed("oculto", false).classed("visible", true);
          d3.select("#texto-descripcion").text(`${ev.texto}: ${descripcionesHitos[ev.texto]}`);
          
          let t = 0;
          while (t < 2500) { if (abortarHistoria) break; await new Promise(r => setTimeout(r, 100)); t += 100; }
        }
        historiaEnCurso = false;
      }

      d3.select("#boton-modo").on("click", function() {
        const estado = d3.select(this).text() === "Ver gráfico con contexto";
        cambiarModo(estado);
        d3.select(this).text(estado ? "Ver gráfico sin contexto" : "Ver gráfico con contexto");
      });

      d3.select("#boton-historia").on("click", reproducirHistoria);
      d3.select("#boton-reset").on("click", resetVista);

      cambiarModo(false);
    });
  </script>
</body>
</html>
